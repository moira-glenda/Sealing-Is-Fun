<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revelation Memorization Game</title>
  <style>
    :root {
      --primary: #ff4fa3;
      --secondary: #ff85c2;
      --light-pink: #ffd6e8;
      --blush-bg: #fff4f8;
      --dark-text: #3a2230;
      --success: #22a06b;
      --error: #d64566;
      --white: #ffffff;
      --shadow: 0 10px 28px rgba(255, 79, 163, 0.16);
      --radius-lg: 22px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Roboto, system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% -10%, #ffe8f3 0, var(--blush-bg) 35%, #fff7fb 100%);
      color: var(--dark-text);
      line-height: 1.45;
      min-height: 100vh;
    }

    .app {
      max-width: 880px;
      margin: 0 auto;
      padding: 0 14px 34px;
    }

    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 12px 0;
      backdrop-filter: blur(8px);
      background: linear-gradient(to bottom, rgba(255, 244, 248, 0.96), rgba(255, 244, 248, 0.72));
    }

    .header-card {
      background: var(--white);
      border: 2px solid #ffe0ee;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    h1 {
      margin: 0;
      color: var(--primary);
      font-size: clamp(1.25rem, 4vw, 1.8rem);
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin: 6px 0 12px;
      font-size: 0.95rem;
      color: #774460;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .pill {
      text-align: center;
      background: #fff0f7;
      border: 1px solid #ffd4e8;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 0.88rem;
      font-weight: 700;
      color: #7b3658;
    }

    .progress-wrap {
      width: 100%;
      height: 14px;
      border-radius: 999px;
      background: #ffe0ee;
      overflow: hidden;
      border: 1px solid #ffc7df;
    }

    .progress {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      transition: width 0.35s ease;
    }

    .mode-tabs {
      margin: 16px 0 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .mode-tabs button {
      border: 2px solid #ffc3de;
      background: #fff;
      color: #7d3c5d;
      border-radius: 12px;
      padding: 12px;
      font-size: 0.9rem;
      font-weight: 700;
      min-height: 54px;
      cursor: pointer;
    }

    .mode-tabs button.active {
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 10px 20px rgba(255, 79, 163, 0.22);
    }

    .card {
      background: var(--white);
      border: 2px solid #ffe2ef;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 12px;
      animation: fadeInUp 0.3s ease;
    }

    .verse-ref {
      display: inline-block;
      font-size: 0.8rem;
      background: #fff0f8;
      border: 1px solid #ffcde4;
      color: #8f4469;
      border-radius: 999px;
      padding: 3px 10px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .question {
      font-size: clamp(1.03rem, 3.7vw, 1.22rem);
      font-weight: 600;
      margin-bottom: 14px;
    }

    .choices {
      display: grid;
      gap: 10px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.14s ease, background 0.2s ease, box-shadow 0.2s ease;
      min-height: 52px;
    }

    .btn:active { transform: scale(0.98); }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      box-shadow: none;
      transform: none;
    }

    .btn-choice {
      background: #fff1f8;
      color: #7c3c5d;
      border: 2px solid #ffcbe4;
      text-align: left;
    }

    .btn-choice.correct { background: #e6f8f0; border-color: #a6e3c7; color: #145b3e; }
    .btn-choice.wrong { background: #ffe9ee; border-color: #f4b7c4; color: #7a2137; }

    .btn-main {
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      color: #fff;
      box-shadow: 0 10px 18px rgba(255, 79, 163, 0.2);
    }

    .btn-ghost {
      background: #fff;
      border: 2px solid #ffc9e3;
      color: #8a4466;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .feedback {
      margin-top: 10px;
      font-weight: 700;
      min-height: 24px;
    }

    .feedback.success { color: var(--success); }
    .feedback.error { color: var(--error); }

    .blank {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-width: 84px;
      padding: 4px 8px;
      border-bottom: 3px solid var(--secondary);
      border-radius: 8px;
      background: #fff8fc;
      margin: 0 3px;
      font-weight: 700;
      color: #733f5a;
    }

    .blank.blank-focus {
      border-bottom-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(255, 79, 163, 0.18);
    }

    .blank.blank-correct {
      background: #e8fff2;
      border-bottom-color: var(--success);
      color: #145b3e;
    }

    .blank.blank-wrong {
      background: #fff0f4;
      border-bottom-color: var(--error);
      color: #8f1f40;
    }

    .word-bank, .chunk-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .chip {
      border: 2px solid #ffc7e0;
      border-radius: 999px;
      background: #fff1f8;
      color: #7f3d5f;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.92rem;
    }

    .chip.used { opacity: 0.45; cursor: not-allowed; }

    .arranged {
      min-height: 48px;
      border: 2px dashed #ffb9da;
      border-radius: 12px;
      padding: 10px;
      background: #fff9fc;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    details summary {
      cursor: pointer;
      font-weight: 700;
      color: #7f3d5f;
      padding: 8px 0;
    }

    .passage {
      background: #fff7fb;
      border: 1px solid #ffd5e8;
      border-radius: 14px;
      padding: 12px;
      font-size: 0.95rem;
      white-space: pre-line;
    }

    .completion {
      text-align: center;
      padding: 22px 16px;
    }

    .completion h2 { color: var(--primary); margin: 0 0 6px; }

    .sparkle {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      z-index: 99;
      animation: pop 1s ease-out forwards;
    }

    @keyframes pop {
      0% { transform: translate(0, 0) scale(0.6); opacity: 1; }
      100% { transform: translate(var(--x), var(--y)) scale(1.4); opacity: 0; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (min-width: 700px) {
      .mode-tabs { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="sticky-header">
      <section class="header-card">
        <h1>Revelation Memorization Game</h1>
        <p class="subtitle">A gentle practice game to help you memorize Revelation 3:7–13 (NIV).</p>
        <div class="stats">
          <div class="pill">Score: <span id="score">0</span></div>
          <div class="pill">Streak: <span id="streak">0</span></div>
          <div class="pill">Best: <span id="bestScore">0</span></div>
        </div>
        <div class="progress-wrap" aria-label="Progress"><div id="progress" class="progress"></div></div>
      </section>
    </header>

    <nav class="mode-tabs">
      <button data-mode="missing" class="active">Missing Word Quiz</button>
      <button data-mode="builder">Verse Builder</button>
      <button data-mode="order">Order the Verse</button>
      <button data-mode="flash">Flashcards</button>
    </nav>

    <main id="gameArea"></main>

    <section class="card">
      <details>
        <summary>Passage Review: Revelation 3:7–13 (NIV)</summary>
        <div id="reviewText" class="passage"></div>
      </details>
      <div class="controls">
        <button id="restartBtn" class="btn btn-main">Restart Round</button>
        <button id="resetBtn" class="btn btn-ghost">Reset Best Score</button>
      </div>
    </section>
  </div>

  <script>
    const TRANSLATION = "NIV";

    // Revelation 3:7–13 (NIV) verse data used by all game modes.
    const verses = [
      { ref: "Revelation 3:7", text: "To the angel of the church in Philadelphia write: These are the words of him who is holy and true, who holds the key of David. What he opens no one can shut, and what he shuts no one can open." },
      { ref: "Revelation 3:8", text: "I know your deeds. See, I have placed before you an open door that no one can shut. I know that you have little strength, yet you have kept my word and have not denied my name." },
      { ref: "Revelation 3:9", text: "I will make those who are of the synagogue of Satan, who claim to be Jews though they are not, but are liars—I will make them come and fall down at your feet and acknowledge that I have loved you." },
      { ref: "Revelation 3:10", text: "Since you have kept my command to endure patiently, I will also keep you from the hour of trial that is going to come on the whole world to test the inhabitants of the earth." },
      { ref: "Revelation 3:11", text: "I am coming soon. Hold on to what you have, so that no one will take your crown." },
      { ref: "Revelation 3:12", text: "The one who is victorious I will make a pillar in the temple of my God. Never again will they leave it. I will write on them the name of my God and the name of the city of my God, the new Jerusalem, which is coming down out of heaven from my God; and I will also write on them my new name." },
      { ref: "Revelation 3:13", text: "Whoever has ears, let them hear what the Spirit says to the churches." }
    ];

    const encouragements = ["Well done!", "You’re getting stronger.", "Great focus!", "Wonderful work!", "Try again — you’ve got this."];

    const state = {
      mode: "missing",
      score: 0,
      streak: 0,
      best: Number(localStorage.getItem("revMemBest") || 0),
      index: 0,
      answered: false,
      hintUsed: false,
      rounds: {
        missing: [],
        builder: [],
        order: [],
        flash: []
      }
    };

    const scoreEl = document.getElementById("score");
    const streakEl = document.getElementById("streak");
    const bestEl = document.getElementById("bestScore");
    const progressEl = document.getElementById("progress");
    const reviewText = document.getElementById("reviewText");
    const gameArea = document.getElementById("gameArea");

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function cleanWord(word) {
      return word.replace(/^[^\w']+|[^\w']+$/g, "");
    }

    function tokenizeVerse(text) {
      return text.split(/\s+/).filter(Boolean).map(raw => ({
        raw,
        clean: cleanWord(raw),
        normalized: cleanWord(raw).toLowerCase()
      }));
    }

    const STOPWORDS = new Set([
      "the", "that", "those", "this", "here", "there", "and", "but", "of", "to", "a", "an", "in", "on", "is", "are",
      "i", "you", "he", "she", "it", "we", "they", "them", "my", "your", "our", "their", "his", "her", "its",
      "who", "what", "which", "as", "at", "by", "for", "from", "into", "out", "up", "down", "with", "no", "not",
      "will", "have", "has", "had", "be", "been", "being", "am", "do", "does", "did", "can", "so", "let", "also"
    ]);

    const BIBLICAL_PRIORITY_WORDS = new Set([
      "philadelphia", "david", "holy", "true", "strength", "denied", "patiently", "trial", "overcome", "victorious",
      "pillar", "temple", "name", "throne", "angel", "church", "key", "deeds", "door", "word", "synagogue", "satan",
      "jews", "liars", "feet", "acknowledge", "loved", "command", "hour", "world", "test", "inhabitants", "earth",
      "crown", "god", "jerusalem", "heaven", "spirit", "churches"
    ]);

    function isMeaningfulWord(word) {
      const normalized = cleanWord(word).toLowerCase();
      if (!normalized || normalized.length < 3) return false;
      if (STOPWORDS.has(normalized)) return false;
      if (/^\d+$/.test(normalized)) return false;
      return true;
    }

    function splitVerseIntoNaturalChunks(tokens) {
      const minSize = 6;
      const maxSize = 10;
      const target = 8;
      const chunks = [];
      let start = 0;

      while (start < tokens.length) {
        const remaining = tokens.length - start;
        if (remaining <= maxSize) {
          chunks.push({ start, end: tokens.length });
          break;
        }

        let bestEnd = Math.min(tokens.length, start + target);
        let bestScore = -Infinity;
        const maxEnd = Math.min(tokens.length, start + maxSize);

        for (let end = start + minSize; end <= maxEnd; end += 1) {
          const lastRaw = tokens[end - 1].raw;
          const chunkSize = end - start;
          let score = -Math.abs(chunkSize - target);

          if (/[.!?;:]$/.test(lastRaw)) score += 5;
          else if (/[,—]$/.test(lastRaw)) score += 3;
          else if (/[)]$/.test(lastRaw)) score += 2;

          if (score > bestScore) {
            bestScore = score;
            bestEnd = end;
          }
        }

        chunks.push({ start, end: bestEnd });
        start = bestEnd;
      }

      return chunks;
    }

    function getCandidateBlankWords(tokens, chunk) {
      return tokens
        .slice(chunk.start, chunk.end)
        .map((token, idx) => ({
          token,
          absoluteIndex: chunk.start + idx,
          localIndex: idx
        }))
        .filter(({ token }) => isMeaningfulWord(token.clean));
    }

    function scoreCandidate(candidate) {
      const { token, localIndex } = candidate;
      const normalized = token.normalized;
      let score = 0;

      if (BIBLICAL_PRIORITY_WORDS.has(normalized)) score += 8;
      if (/^[A-Z]/.test(token.clean)) score += 4;
      if (/(ing|ed|tion|ment|ness|ship|ous|ful|ive|ary)$/.test(normalized)) score += 3;
      if (/(ity|ance|ence|ism|ize|ify)$/.test(normalized)) score += 2;

      score += Math.min(token.clean.length, 10) * 0.5;
      if (localIndex === 0) score -= 1;

      return score;
    }

    function chooseBestBlankWord(tokens, chunk) {
      const candidates = getCandidateBlankWords(tokens, chunk);
      if (!candidates.length) return null;

      return candidates
        .slice()
        .sort((a, b) => scoreCandidate(b) - scoreCandidate(a))[0];
    }

    const CATEGORY_POOLS = {
      place: [
        "Philadelphia", "Ephesus", "Smyrna", "Pergamum", "Thyatira", "Sardis", "Laodicea", "Jerusalem", "Bethlehem", "heaven", "earth", "world"
      ],
      person: [
        "David", "Moses", "Abraham", "Jacob", "John", "Peter", "Paul", "angel", "God", "Spirit", "Satan", "Jews"
      ],
      object: [
        "key", "door", "pillar", "temple", "crown", "throne", "altar", "name", "synagogue", "church", "churches", "feet"
      ],
      action: [
        "overcome", "endure", "deny", "keep", "open", "shut", "worship", "conquer", "hold", "hear", "write", "acknowledge", "test"
      ],
      spiritual: [
        "holy", "true", "victorious", "trial", "command", "word", "deeds", "strength", "loved", "patiently", "hour"
      ]
    };

    const CATEGORY_LOOKUPS = {
      place: new Set(CATEGORY_POOLS.place.map(word => word.toLowerCase())),
      person: new Set(CATEGORY_POOLS.person.map(word => word.toLowerCase())),
      object: new Set(CATEGORY_POOLS.object.map(word => word.toLowerCase())),
      action: new Set(CATEGORY_POOLS.action.map(word => word.toLowerCase())),
      spiritual: new Set(CATEGORY_POOLS.spiritual.map(word => word.toLowerCase()))
    };

    function buildVocabulary(baseWords, answer) {
      return [...new Set(baseWords.filter(word => word && word.toLowerCase() !== answer.toLowerCase()))];
    }

    function detectWordCategory(word) {
      const normalized = cleanWord(word).toLowerCase();
      if (!normalized) return "spiritual";

      if (CATEGORY_LOOKUPS.place.has(normalized)) return "place";
      if (CATEGORY_LOOKUPS.person.has(normalized)) return "person";
      if (CATEGORY_LOOKUPS.object.has(normalized)) return "object";
      if (CATEGORY_LOOKUPS.action.has(normalized)) return "action";
      if (CATEGORY_LOOKUPS.spiritual.has(normalized)) return "spiritual";

      if (/^[A-Z]/.test(word)) return "person";
      if (/(ing|ed)$/.test(normalized)) return "action";
      return "spiritual";
    }

    function getDistractorsForCategory(category, correctWord, contextWords, globalVocabulary) {
      const normalizedCorrect = correctWord.toLowerCase();
      const inCategory = (candidate) => detectWordCategory(candidate) === category;
      const meaningfulContext = contextWords
        .filter(isMeaningfulWord)
        .filter(inCategory);
      const meaningfulGlobal = globalVocabulary
        .filter(isMeaningfulWord)
        .filter(inCategory);
      const categoryPool = CATEGORY_POOLS[category] || [];

      const rankedPool = buildVocabulary([
        ...meaningfulContext,
        ...categoryPool,
        ...meaningfulGlobal
      ], correctWord)
        .filter(word => word.toLowerCase() !== normalizedCorrect)
        .sort((a, b) => {
          const aInContext = meaningfulContext.includes(a) ? 1 : 0;
          const bInContext = meaningfulContext.includes(b) ? 1 : 0;
          return bInContext - aInContext;
        });

      return shuffle(rankedPool).slice(0, 3);
    }

    function generateConfusingOptions(correctWord, contextWords, globalVocabulary) {
      const category = detectWordCategory(correctWord);
      const distractors = getDistractorsForCategory(category, correctWord, contextWords, globalVocabulary);

      if (distractors.length < 3) {
        const meaningfulFallback = buildVocabulary(
          [...contextWords, ...globalVocabulary].filter(isMeaningfulWord),
          correctWord
        );
        for (const candidate of shuffle(meaningfulFallback)) {
          if (!distractors.includes(candidate)) distractors.push(candidate);
          if (distractors.length === 3) break;
        }
      }

      return shuffle([correctWord, ...distractors.slice(0, 3)]);
    }

    function generateOptions(correct, contextWords, globalVocabulary) {
      return generateConfusingOptions(correct, contextWords, globalVocabulary);
    }

    function generateMissingWords(verseText, globalVocabulary) {
      const tokens = tokenizeVerse(verseText);
      const chunks = splitVerseIntoNaturalChunks(tokens);
      const chunksWithBlanks = chunks
        .map(chunk => {
          const best = chooseBestBlankWord(tokens, chunk);
          return {
            ...chunk,
            blankIndex: best ? best.absoluteIndex : null
          };
        })
        .filter(chunk => chunk.blankIndex !== null);

      const verseWords = tokens.map(t => t.clean).filter(Boolean);
      const blankPositions = chunksWithBlanks.map(chunk => chunk.blankIndex);
      return {
        tokens,
        blankPositions,
        chunks: chunksWithBlanks,
        prompts: chunksWithBlanks.map(chunk => ({
          index: chunk.blankIndex,
          answer: tokens[chunk.blankIndex].clean,
          options: generateOptions(tokens[chunk.blankIndex].clean, verseWords, globalVocabulary)
        }))
      };
    }

    function buildRounds() {
      const globalVocabulary = verses
        .flatMap(v => tokenizeVerse(v.text).map(t => t.clean))
        .filter(Boolean);

      state.rounds.missing = verses.map(v => {
        const generated = generateMissingWords(v.text, globalVocabulary);
        return { ...v, ...generated };
      });

      state.rounds.builder = verses.slice(0, 5).map(v => {
        const generated = generateMissingWords(v.text, globalVocabulary);
        const blanks = generated.blankPositions.map(index => generated.tokens[index].clean);
        return { ...v, ...generated, blanks, choices: shuffle(blanks) };
      });

      state.rounds.order = verses.slice(2).map(v => {
        const chunks = (v.chunks && v.chunks.length)
          ? v.chunks
          : v.text.split(/,\s+/).slice(0, 4);
        return { ...v, chunks, shuffled: shuffle(chunks) };
      });

      state.rounds.flash = [...verses];
    }

    function updateHeader() {
      scoreEl.textContent = state.score;
      streakEl.textContent = state.streak;
      bestEl.textContent = state.best;
      const total = state.rounds[state.mode].length || 1;
      const progress = Math.min((state.index / total) * 100, 100);
      progressEl.style.width = `${progress}%`;
    }

    function encouragement(isGood) {
      return isGood ? encouragements[Math.floor(Math.random() * 4)] : encouragements[4];
    }

    function render() {
      updateHeader();
      const round = state.rounds[state.mode];
      if (state.index >= round.length) return renderCompletion();
      if (state.mode === "missing") return renderMissing(round[state.index]);
      if (state.mode === "builder") return renderBuilder(round[state.index]);
      if (state.mode === "order") return renderOrder(round[state.index]);
      return renderFlash(round[state.index]);
    }

    function renderMissing(item) {
      state.answered = false;
      state.hintUsed = false;

      if (!item.chunkProgress || item.chunkProgress.verseIndex !== state.index) {
        item.chunkProgress = { verseIndex: state.index, chunkIndex: 0, promptIndex: 0 };
      }

      const progress = item.chunkProgress;
      const chunk = item.chunks[progress.chunkIndex];
      const prompt = item.prompts[progress.promptIndex];

      if (!chunk || !prompt) {
        state.index += 1;
        render();
        return;
      }

      const displayTokens = item.tokens.slice(chunk.start, chunk.end).map((token, localIdx) => {
        const absoluteIndex = chunk.start + localIdx;
        if (absoluteIndex !== prompt.index) return token.raw;
        return `<span id="activeBlank" class="blank blank-focus">_____</span>`;
      }).join(" ");

      gameArea.innerHTML = `
        <section class="card">
          <span class="verse-ref">${item.ref} (${TRANSLATION})</span>
          <div class="feedback">Chunk ${progress.chunkIndex + 1}/${item.chunks.length}</div>
          <div class="question">${displayTokens}</div>
          <div class="choices">
            ${prompt.options.map(opt => `<button class="btn btn-choice" data-choice="${opt}">${opt}</button>`).join("")}
          </div>
          <div id="feedback" class="feedback" aria-live="polite"></div>
          <div class="controls">
            <button id="hintBtn" class="btn btn-ghost">Hint</button>
            <button id="nextBtn" class="btn btn-main" disabled>Next Chunk</button>
          </div>
        </section>`;

      const feedback = document.getElementById("feedback");
      const nextBtn = document.getElementById("nextBtn");
      const blankEl = document.getElementById("activeBlank");

      gameArea.querySelectorAll("[data-choice]").forEach(btn => {
        btn.addEventListener("click", () => {
          if (state.answered) return;
          const isCorrect = btn.dataset.choice.toLowerCase() === prompt.answer.toLowerCase();

          if (isCorrect) {
            state.answered = true;
            nextBtn.disabled = false;
            blankEl.textContent = prompt.answer;
            blankEl.classList.remove("blank-focus", "blank-wrong");
            blankEl.classList.add("blank-correct");

            gameArea.querySelectorAll("[data-choice]").forEach(choice => {
              const ok = choice.dataset.choice.toLowerCase() === prompt.answer.toLowerCase();
              choice.classList.add(ok ? "correct" : "wrong");
              choice.disabled = true;
            });

            handleScore(true, state.hintUsed ? 5 : 10);
            feedback.textContent = encouragement(true);
            feedback.className = "feedback success";

            setTimeout(() => {
              blankEl.classList.remove("blank-correct");
            }, 500);
          } else {
            btn.classList.add("wrong");
            btn.disabled = true;
            blankEl.classList.add("blank-wrong");
            feedback.textContent = "Not quite—try again.";
            feedback.className = "feedback error";
            handleScore(false, 0);

            setTimeout(() => {
              blankEl.classList.remove("blank-wrong");
            }, 450);
          }
        });
      });

      document.getElementById("hintBtn").addEventListener("click", () => {
        if (state.hintUsed || state.answered) return;
        state.hintUsed = true;
        const choices = [...gameArea.querySelectorAll("[data-choice]:not([disabled])")];
        const wrong = choices.filter(c => c.dataset.choice.toLowerCase() !== prompt.answer.toLowerCase());
        shuffle(wrong).slice(0, 2).forEach(el => {
          el.disabled = true;
          el.classList.add("used");
        });
        feedback.textContent = `Hint: starts with “${prompt.answer[0]}”`;
        feedback.className = "feedback";
      });

      nextBtn.addEventListener("click", () => {
        progress.chunkIndex += 1;
        progress.promptIndex += 1;

        if (progress.chunkIndex >= item.chunks.length || progress.promptIndex >= item.prompts.length) {
          state.index += 1;
        }

        render();
      });
    }

    function renderBuilder(item) {
      if (!item.builderState || item.builderState.verseIndex !== state.index) {
        item.builderState = {
          verseIndex: state.index,
          builderAnswers: Array(item.blankPositions.length).fill(null),
          builderCompleted: false,
          builderCorrect: false,
          canGoNext: false
        };
      }

      const builderState = item.builderState;

      const filled = item.tokens.map((token, idx) => (
        item.blankPositions.includes(idx)
          ? `<span class="blank" data-blank-index="${idx}">____</span>`
          : token.raw
      )).join(" ");

      gameArea.innerHTML = `
        <section class="card">
          <span class="verse-ref">${item.ref} (${TRANSLATION})</span>
          <div class="question">${filled}</div>
          <div class="word-bank">${shuffle(item.choices).map(c => `<button class="chip" data-word="${c}">${c}</button>`).join("")}</div>
          <div id="feedback" class="feedback">Finish building the verse first.</div>
          <div class="controls">
            <button id="checkBtn" class="btn btn-main" disabled>Check Verse</button>
            <button id="nextBtn" class="btn btn-ghost" disabled>Next</button>
          </div>
        </section>`;

      const blanks = [...gameArea.querySelectorAll(".blank")];
      const chips = [...gameArea.querySelectorAll("[data-word]")];
      const checkBtn = document.getElementById("checkBtn");
      const nextBtn = document.getElementById("nextBtn");
      const feedback = document.getElementById("feedback");

      function isBuilderComplete() {
        return builderState.builderAnswers.every(Boolean);
      }

      function updateButtonStates() {
        builderState.builderCompleted = isBuilderComplete();
        checkBtn.disabled = !builderState.builderCompleted || builderState.builderCorrect;
        nextBtn.disabled = !builderState.canGoNext;

        if (!builderState.builderCorrect) {
          feedback.textContent = builderState.builderCompleted
            ? "Press Check Verse to submit your answer."
            : "Finish building the verse first.";
          feedback.className = "feedback";
        }
      }

      function resetBuilderAttempt() {
        builderState.builderAnswers = Array(item.blankPositions.length).fill(null);
        builderState.builderCompleted = false;
        builderState.builderCorrect = false;
        builderState.canGoNext = false;

        blanks.forEach(blank => {
          blank.textContent = "____";
          blank.classList.remove("blank-correct", "blank-wrong");
        });

        chips.forEach(chip => {
          chip.classList.remove("used");
          chip.disabled = false;
        });

        feedback.textContent = "Not quite right. Try again.";
        feedback.className = "feedback error";
        updateButtonStates();
      }

      function placeBuilderWord(chip, word) {
        if (builderState.builderCorrect || chip.classList.contains("used")) return;
        const blankIndex = builderState.builderAnswers.findIndex(answer => answer === null);
        if (blankIndex === -1) return;

        builderState.builderAnswers[blankIndex] = word;
        blanks[blankIndex].textContent = word;
        chip.classList.add("used");
        chip.disabled = true;
        updateButtonStates();
      }

      function checkBuilderAnswer() {
        if (!isBuilderComplete() || builderState.builderCorrect) return;

        const expected = item.blankPositions.map(i => item.tokens[i].clean);
        const good = builderState.builderAnswers.every((word, idx) => word === expected[idx]);

        if (good) {
          builderState.builderCorrect = true;
          builderState.canGoNext = true;
          blanks.forEach(blank => blank.classList.add("blank-correct"));
          chips.forEach(chip => chip.disabled = true);
          feedback.textContent = "Correct! You can move to the next question.";
          feedback.className = "feedback success";
          handleScore(true, 15);
          updateButtonStates();
          return;
        }

        handleScore(false, 0);
        resetBuilderAttempt();
      }

      chips.forEach(chip => {
        chip.addEventListener("click", () => {
          placeBuilderWord(chip, chip.dataset.word);
        });
      });

      checkBtn.addEventListener("click", checkBuilderAnswer);

      updateButtonStates();

      nextBtn.addEventListener("click", () => {
        if (!builderState.canGoNext) return;
        next();
      });
    }

    function renderOrder(item) {
      const orderState = {
        orderedSelections: [],
        orderCompleted: false,
        orderCorrect: false,
        canGoNext: false,
        availableChunks: shuffleOrderChunks()
      };

      gameArea.innerHTML = `
        <section class="card">
          <span class="verse-ref">${item.ref} (${TRANSLATION})</span>
          <div class="question">Tap the chunks in order.</div>
          <div id="chunkBank" class="chunk-bank"></div>
          <div id="arranged" class="arranged"></div>
          <div id="feedback" class="feedback error">Finish ordering the verse first.</div>
          <div class="controls">
            <button id="checkBtn" class="btn btn-main" disabled>Check Order</button>
            <button id="nextBtn" class="btn btn-ghost" disabled>Next</button>
          </div>
        </section>`;

      const chunkBank = document.getElementById("chunkBank");
      const arrangedEl = document.getElementById("arranged");
      const feedback = document.getElementById("feedback");
      const checkBtn = document.getElementById("checkBtn");
      const nextBtn = document.getElementById("nextBtn");

      function shuffleOrderChunks() {
        return shuffle(item.chunks);
      }

      function isOrderComplete() {
        return orderState.orderedSelections.length === item.chunks.length;
      }

      function updateButtonStates() {
        orderState.orderCompleted = isOrderComplete();
        checkBtn.disabled = !orderState.orderCompleted || orderState.orderCorrect;
        nextBtn.disabled = !orderState.canGoNext;

        if (!orderState.orderCompleted && !orderState.orderCorrect) {
          feedback.textContent = "Finish ordering the verse first.";
          feedback.className = "feedback error";
        }
      }

      function renderOrderMode() {
        arrangedEl.innerHTML = "";
        chunkBank.innerHTML = "";

        orderState.availableChunks.forEach((chunk, chunkIndex) => {
          const chip = document.createElement("button");
          chip.className = "chip";
          chip.type = "button";
          chip.textContent = chunk;
          chip.disabled = orderState.orderCorrect;
          chip.addEventListener("click", () => placeOrderChunk(chunkIndex, orderState.orderedSelections.length));
          chunkBank.appendChild(chip);
        });

        orderState.orderedSelections.forEach(chunk => {
          const tag = document.createElement("span");
          tag.className = "chip";
          tag.textContent = chunk;
          arrangedEl.appendChild(tag);
        });

        updateButtonStates();
      }

      function placeOrderChunk(chunkIndex, targetIndex) {
        if (orderState.orderCorrect || orderState.orderCompleted) return;
        const [selectedChunk] = orderState.availableChunks.splice(chunkIndex, 1);
        if (!selectedChunk) return;
        orderState.orderedSelections.splice(targetIndex, 0, selectedChunk);
        renderOrderMode();
      }

      function resetOrderAttempt() {
        orderState.orderedSelections = [];
        orderState.orderCompleted = false;
        orderState.orderCorrect = false;
        orderState.canGoNext = false;
        orderState.availableChunks = shuffleOrderChunks();
        feedback.textContent = "Not quite right. Try again.";
        feedback.className = "feedback error";
        renderOrderMode();
      }

      function checkOrderAnswer() {
        if (!isOrderComplete() || orderState.orderCorrect) {
          feedback.textContent = "Finish ordering the verse first.";
          feedback.className = "feedback error";
          updateButtonStates();
          return;
        }

        const good = JSON.stringify(orderState.orderedSelections) === JSON.stringify(item.chunks);
        if (!good) {
          handleScore(false, 0);
          resetOrderAttempt();
          return;
        }

        orderState.orderCorrect = true;
        orderState.canGoNext = true;
        feedback.textContent = "Correct! You can move to the next question.";
        feedback.className = "feedback success";
        handleScore(true, 20);
        renderOrderMode();
      }

      checkBtn.addEventListener("click", checkOrderAnswer);
      nextBtn.addEventListener("click", () => {
        if (!orderState.canGoNext) return;
        next();
      });

      renderOrderMode();
    }

    function renderFlash(item) {
      gameArea.innerHTML = `
        <section class="card">
          <span class="verse-ref">${item.ref} (${TRANSLATION})</span>
          <div class="question">${item.text}</div>
          <div class="feedback success">Review this verse, then move on.</div>
          <div class="controls">
            <button id="nextBtn" class="btn btn-main">Next Card</button>
            <button id="bonusBtn" class="btn btn-ghost">+5 Focus Points</button>
          </div>
        </section>`;
      document.getElementById("nextBtn").addEventListener("click", next);
      document.getElementById("bonusBtn").addEventListener("click", () => {
        state.score += 5;
        updateBest();
        updateHeader();
      });
    }

    function handleScore(correct, pts) {
      if (correct) {
        state.score += pts;
        state.streak += 1;
      } else {
        state.streak = 0;
      }
      updateBest();
      updateHeader();
    }

    function updateBest() {
      if (state.score > state.best) {
        state.best = state.score;
        localStorage.setItem("revMemBest", String(state.best));
      }
    }

    function next() {
      state.index += 1;
      render();
    }

    function celebrate() {
      for (let i = 0; i < 70; i++) {
        const dot = document.createElement("div");
        dot.className = "sparkle";
        dot.style.left = `${Math.random() * window.innerWidth}px`;
        dot.style.top = `${Math.random() * window.innerHeight * 0.5}px`;
        dot.style.background = ["#ff4fa3", "#ff85c2", "#ffd6e8", "#22a06b"][Math.floor(Math.random() * 4)];
        dot.style.setProperty("--x", `${(Math.random() - 0.5) * 220}px`);
        dot.style.setProperty("--y", `${Math.random() * 260 + 40}px`);
        document.body.appendChild(dot);
        setTimeout(() => dot.remove(), 1100);
      }
    }

    function renderCompletion() {
      celebrate();
      gameArea.innerHTML = `
        <section class="card completion">
          <h2>Round Complete 🎉</h2>
          <p>You reviewed all cards in this mode. Keep going—you’re building strong memory in the Word.</p>
          <p><strong>Final Score:</strong> ${state.score}</p>
          <div class="controls">
            <button id="replayBtn" class="btn btn-main">Replay This Mode</button>
            <button id="switchBtn" class="btn btn-ghost">Pick Another Mode</button>
          </div>
        </section>`;

      document.getElementById("replayBtn").addEventListener("click", () => resetMode(state.mode));
      document.getElementById("switchBtn").addEventListener("click", () => {
        state.index = 0;
        updateHeader();
        gameArea.innerHTML = `<section class="card"><div class="question">Choose another mode to continue memorizing.</div></section>`;
      });
    }

    function resetMode(mode) {
      buildRounds();
      state.mode = mode;
      state.index = 0;
      state.streak = 0;
      state.score = 0;
      updateHeader();
      render();
    }

    document.querySelectorAll(".mode-tabs button").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".mode-tabs button").forEach(b => b.classList.remove("active"));
        tab.classList.add("active");
        resetMode(tab.dataset.mode);
      });
    });

    document.getElementById("restartBtn").addEventListener("click", () => resetMode(state.mode));
    document.getElementById("resetBtn").addEventListener("click", () => {
      localStorage.removeItem("revMemBest");
      state.best = 0;
      updateHeader();
    });

    reviewText.textContent = verses.map(v => `${v.ref} (${TRANSLATION})\n${v.text}`).join("\n\n");

    buildRounds();
    updateHeader();
    render();
  </script>
</body>
</html>
