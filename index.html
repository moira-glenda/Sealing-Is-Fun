<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revelation Memorization Game</title>
  <style>
    :root {
      --primary: #ff4fa3;
      --secondary: #ff85c2;
      --light-pink: #ffd6e8;
      --blush-bg: #fff4f8;
      --dark-text: #3a2230;
      --success: #22a06b;
      --error: #d64566;
      --white: #ffffff;
      --shadow: 0 10px 28px rgba(255, 79, 163, 0.16);
      --radius-lg: 22px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Roboto, system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% -10%, #ffe8f3 0, var(--blush-bg) 35%, #fff7fb 100%);
      color: var(--dark-text);
      line-height: 1.45;
      min-height: 100vh;
    }

    .app {
      max-width: 880px;
      margin: 0 auto;
      padding: 0 14px 34px;
    }

    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 12px 0;
      backdrop-filter: blur(8px);
      background: linear-gradient(to bottom, rgba(255, 244, 248, 0.96), rgba(255, 244, 248, 0.72));
    }

    .header-card {
      background: var(--white);
      border: 2px solid #ffe0ee;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    h1 {
      margin: 0;
      color: var(--primary);
      font-size: clamp(1.25rem, 4vw, 1.8rem);
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin: 6px 0 12px;
      font-size: 0.95rem;
      color: #774460;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .pill {
      text-align: center;
      background: #fff0f7;
      border: 1px solid #ffd4e8;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 0.88rem;
      font-weight: 700;
      color: #7b3658;
    }

    .progress-wrap {
      width: 100%;
      height: 14px;
      border-radius: 999px;
      background: #ffe0ee;
      overflow: hidden;
      border: 1px solid #ffc7df;
    }

    .progress {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      transition: width 0.35s ease;
    }

    .mode-tabs {
      margin: 16px 0 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .mode-tabs button {
      border: 2px solid #ffc3de;
      background: #fff;
      color: #7d3c5d;
      border-radius: 12px;
      padding: 12px;
      font-size: 0.9rem;
      font-weight: 700;
      min-height: 54px;
      cursor: pointer;
    }

    .mode-tabs button.active {
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 10px 20px rgba(255, 79, 163, 0.22);
    }

    .card {
      background: var(--white);
      border: 2px solid #ffe2ef;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 12px;
      animation: fadeInUp 0.3s ease;
    }

    .verse-ref {
      display: inline-block;
      font-size: 0.8rem;
      background: #fff0f8;
      border: 1px solid #ffcde4;
      color: #8f4469;
      border-radius: 999px;
      padding: 3px 10px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .question {
      font-size: clamp(1.03rem, 3.7vw, 1.22rem);
      font-weight: 600;
      margin-bottom: 14px;
    }

    .choices {
      display: grid;
      gap: 10px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.14s ease, background 0.2s ease, box-shadow 0.2s ease;
      min-height: 52px;
    }

    .btn:active { transform: scale(0.98); }

    .btn-choice {
      background: #fff1f8;
      color: #7c3c5d;
      border: 2px solid #ffcbe4;
      text-align: left;
    }

    .btn-choice.correct { background: #e6f8f0; border-color: #a6e3c7; color: #145b3e; }
    .btn-choice.wrong { background: #ffe9ee; border-color: #f4b7c4; color: #7a2137; }

    .btn-main {
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      color: #fff;
      box-shadow: 0 10px 18px rgba(255, 79, 163, 0.2);
    }

    .btn-ghost {
      background: #fff;
      border: 2px solid #ffc9e3;
      color: #8a4466;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .feedback {
      margin-top: 10px;
      font-weight: 700;
      min-height: 24px;
    }

    .feedback.success { color: var(--success); }
    .feedback.error { color: var(--error); }

    .blank {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-width: 84px;
      padding: 4px 8px;
      border-bottom: 3px solid var(--secondary);
      border-radius: 8px;
      background: #fff8fc;
      margin: 0 3px;
      font-weight: 700;
      color: #733f5a;
    }

    .word-bank, .chunk-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .chip {
      border: 2px solid #ffc7e0;
      border-radius: 999px;
      background: #fff1f8;
      color: #7f3d5f;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.92rem;
    }

    .chip.used { opacity: 0.45; cursor: not-allowed; }

    .arranged {
      min-height: 48px;
      border: 2px dashed #ffb9da;
      border-radius: 12px;
      padding: 10px;
      background: #fff9fc;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    details summary {
      cursor: pointer;
      font-weight: 700;
      color: #7f3d5f;
      padding: 8px 0;
    }

    .passage {
      background: #fff7fb;
      border: 1px solid #ffd5e8;
      border-radius: 14px;
      padding: 12px;
      font-size: 0.95rem;
      white-space: pre-line;
    }

    .completion {
      text-align: center;
      padding: 22px 16px;
    }

    .completion h2 { color: var(--primary); margin: 0 0 6px; }

    .sparkle {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      z-index: 99;
      animation: pop 1s ease-out forwards;
    }

    @keyframes pop {
      0% { transform: translate(0, 0) scale(0.6); opacity: 1; }
      100% { transform: translate(var(--x), var(--y)) scale(1.4); opacity: 0; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (min-width: 700px) {
      .mode-tabs { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="sticky-header">
      <section class="header-card">
        <h1>Revelation Memorization Game</h1>
        <p class="subtitle">A gentle practice game to help you memorize Revelation 3:7–13.</p>
        <div class="stats">
          <div class="pill">Score: <span id="score">0</span></div>
          <div class="pill">Streak: <span id="streak">0</span></div>
          <div class="pill">Best: <span id="bestScore">0</span></div>
        </div>
        <div class="progress-wrap" aria-label="Progress"><div id="progress" class="progress"></div></div>
      </section>
    </header>

    <nav class="mode-tabs">
      <button data-mode="missing" class="active">Missing Word Quiz</button>
      <button data-mode="builder">Verse Builder</button>
      <button data-mode="order">Order the Verse</button>
      <button data-mode="flash">Flashcards</button>
    </nav>

    <main id="gameArea"></main>

    <section class="card">
      <details>
        <summary>Passage Review: Revelation 3:7–13</summary>
        <div id="reviewText" class="passage"></div>
      </details>
      <div class="controls">
        <button id="restartBtn" class="btn btn-main">Restart Round</button>
        <button id="resetBtn" class="btn btn-ghost">Reset Best Score</button>
      </div>
    </section>
  </div>

  <script>
    // Revelation 3:7–13 verse data used by all game modes.
    const verses = [
      { ref: "Revelation 3:7", text: "And to the angel of the church in Philadelphia write; These things saith he that is holy, he that is true, he that hath the key of David, he that openeth, and no man shutteth; and shutteth, and no man openeth.", keywords: ["holy", "true", "key", "openeth"] },
      { ref: "Revelation 3:8", text: "I know thy works: behold, I have set before thee an open door, and no man can shut it: for thou hast a little strength, and hast kept my word, and hast not denied my name.", keywords: ["open", "door", "strength", "word"] },
      { ref: "Revelation 3:9", text: "Behold, I will make them of the synagogue of Satan, which say they are Jews, and are not, but do lie; behold, I will make them to come and worship before thy feet, and to know that I have loved thee.", keywords: ["worship", "loved", "feet"] },
      { ref: "Revelation 3:10", text: "Because thou hast kept the word of my patience, I also will keep thee from the hour of temptation, which shall come upon all the world, to try them that dwell upon the earth.", keywords: ["patience", "keep", "temptation", "earth"] },
      { ref: "Revelation 3:11", text: "Behold, I come quickly: hold that fast which thou hast, that no man take thy crown.", keywords: ["quickly", "hold", "crown"] },
      { ref: "Revelation 3:12", text: "Him that overcometh will I make a pillar in the temple of my God, and he shall go no more out: and I will write upon him the name of my God, and the name of the city of my God, which is new Jerusalem, which cometh down out of heaven from my God: and I will write upon him my new name.", keywords: ["overcometh", "pillar", "Jerusalem", "name"] },
      { ref: "Revelation 3:13", text: "He that hath an ear, let him hear what the Spirit saith unto the churches.", keywords: ["ear", "hear", "Spirit", "churches"] }
    ];

    const encouragements = ["Well done!", "You’re getting stronger.", "Great focus!", "Wonderful work!", "Try again — you’ve got this."];

    const state = {
      mode: "missing",
      score: 0,
      streak: 0,
      best: Number(localStorage.getItem("revMemBest") || 0),
      index: 0,
      answered: false,
      hintUsed: false,
      rounds: {
        missing: [],
        builder: [],
        order: [],
        flash: []
      }
    };

    const scoreEl = document.getElementById("score");
    const streakEl = document.getElementById("streak");
    const bestEl = document.getElementById("bestScore");
    const progressEl = document.getElementById("progress");
    const reviewText = document.getElementById("reviewText");
    const gameArea = document.getElementById("gameArea");

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function pickWord(text) {
      const words = text.replace(/[^\w\s']/g, "").split(/\s+/).filter(w => w.length > 3);
      return words[Math.floor(Math.random() * words.length)] || "word";
    }

    function buildRounds() {
      state.rounds.missing = verses.map(v => {
        const answer = pickWord(v.text);
        const options = shuffle([
          answer,
          ...shuffle(verses.flatMap(item => item.keywords || []).filter(w => w.toLowerCase() !== answer.toLowerCase())).slice(0, 3)
        ]);
        return { ...v, answer, options };
      });

      state.rounds.builder = verses.slice(0, 5).map(v => {
        const words = v.text.replace(/[^\w\s']/g, "").split(/\s+/);
        const blanks = shuffle(words.filter(w => w.length > 4)).slice(0, 3);
        return { ...v, blanks, choices: shuffle(blanks) };
      });

      state.rounds.order = verses.slice(2).map(v => {
        const chunks = (v.chunks && v.chunks.length)
          ? v.chunks
          : v.text.split(/,\s+/).slice(0, 4);
        return { ...v, chunks, shuffled: shuffle(chunks) };
      });

      state.rounds.flash = [...verses];
    }

    function updateHeader() {
      scoreEl.textContent = state.score;
      streakEl.textContent = state.streak;
      bestEl.textContent = state.best;
      const total = state.rounds[state.mode].length || 1;
      const progress = Math.min((state.index / total) * 100, 100);
      progressEl.style.width = `${progress}%`;
    }

    function encouragement(isGood) {
      return isGood ? encouragements[Math.floor(Math.random() * 4)] : encouragements[4];
    }

    function render() {
      updateHeader();
      const round = state.rounds[state.mode];
      if (state.index >= round.length) return renderCompletion();
      if (state.mode === "missing") return renderMissing(round[state.index]);
      if (state.mode === "builder") return renderBuilder(round[state.index]);
      if (state.mode === "order") return renderOrder(round[state.index]);
      return renderFlash(round[state.index]);
    }

    function renderMissing(item) {
      state.answered = false;
      state.hintUsed = false;
      const hidden = item.text.replace(new RegExp(`\\b${item.answer}\\b`, "i"), "____");
      gameArea.innerHTML = `
        <section class="card">
          <span class="verse-ref">${item.ref}</span>
          <div class="question">${hidden}</div>
          <div class="choices">
            ${item.options.map(opt => `<button class="btn btn-choice" data-choice="${opt}">${opt}</button>`).join("")}
          </div>
          <div id="feedback" class="feedback" aria-live="polite"></div>
          <div class="controls">
            <button id="hintBtn" class="btn btn-ghost">Hint</button>
            <button id="nextBtn" class="btn btn-main" disabled>Next</button>
          </div>
        </section>`;

      const feedback = document.getElementById("feedback");
      const nextBtn = document.getElementById("nextBtn");

      gameArea.querySelectorAll("[data-choice]").forEach(btn => {
        btn.addEventListener("click", () => {
          if (state.answered) return;
          const isCorrect = btn.dataset.choice.toLowerCase() === item.answer.toLowerCase();
          state.answered = true;
          nextBtn.disabled = false;
          gameArea.querySelectorAll("[data-choice]").forEach(b => {
            const ok = b.dataset.choice.toLowerCase() === item.answer.toLowerCase();
            b.classList.add(ok ? "correct" : "wrong");
            b.disabled = true;
          });
          handleScore(isCorrect, state.hintUsed ? 5 : 10);
          feedback.textContent = isCorrect ? encouragement(true) : `Correct word: ${item.answer}. ${encouragement(false)}`;
          feedback.className = `feedback ${isCorrect ? "success" : "error"}`;
        });
      });

      document.getElementById("hintBtn").addEventListener("click", () => {
        if (state.hintUsed || state.answered) return;
        state.hintUsed = true;
        const choices = [...gameArea.querySelectorAll("[data-choice]")];
        const wrong = choices.filter(c => c.dataset.choice.toLowerCase() !== item.answer.toLowerCase());
        shuffle(wrong).slice(0, 2).forEach(el => {
          el.disabled = true;
          el.classList.add("used");
        });
        feedback.textContent = `Hint: starts with “${item.answer[0]}”`;
        feedback.className = "feedback";
      });

      nextBtn.addEventListener("click", next);
    }

    function renderBuilder(item) {
      const words = item.text.split(" ");
      let used = [];
      const replaced = words.map(w => {
        const clean = w.replace(/[^\w']/g, "");
        if (item.blanks.includes(clean) && !used.includes(clean)) {
          used.push(clean);
          return `<span class="blank" data-blank="${clean}">____</span>`;
        }
        return w;
      }).join(" ");

      gameArea.innerHTML = `
        <section class="card">
          <span class="verse-ref">${item.ref}</span>
          <div class="question">${replaced}</div>
          <div class="word-bank">${shuffle(item.choices).map(c => `<button class="chip" data-word="${c}">${c}</button>`).join("")}</div>
          <div id="feedback" class="feedback"></div>
          <div class="controls">
            <button id="checkBtn" class="btn btn-main">Check Verse</button>
            <button id="nextBtn" class="btn btn-ghost" disabled>Next</button>
          </div>
        </section>`;

      const blanks = [...gameArea.querySelectorAll(".blank")];
      const selected = [];

      gameArea.querySelectorAll("[data-word]").forEach(chip => {
        chip.addEventListener("click", () => {
          if (chip.classList.contains("used") || selected.length >= blanks.length) return;
          chip.classList.add("used");
          selected.push(chip.dataset.word);
          blanks[selected.length - 1].textContent = chip.dataset.word;
        });
      });

      document.getElementById("checkBtn").addEventListener("click", () => {
        const good = selected.length === item.blanks.length && selected.every((w, i) => w === item.blanks[i]);
        const feedback = document.getElementById("feedback");
        feedback.textContent = good ? `${encouragement(true)} Verse complete!` : encouragement(false);
        feedback.className = `feedback ${good ? "success" : "error"}`;
        handleScore(good, 15);
        document.getElementById("nextBtn").disabled = false;
      });

      document.getElementById("nextBtn").addEventListener("click", next);
    }

    function renderOrder(item) {
      let arranged = [];
      gameArea.innerHTML = `
        <section class="card">
          <span class="verse-ref">${item.ref}</span>
          <div class="question">Tap the chunks in order.</div>
          <div class="chunk-bank">${item.shuffled.map(c => `<button class="chip" data-chunk="${c.replace(/"/g, '&quot;')}">${c}</button>`).join("")}</div>
          <div id="arranged" class="arranged"></div>
          <div id="feedback" class="feedback"></div>
          <div class="controls">
            <button id="checkBtn" class="btn btn-main">Check Order</button>
            <button id="nextBtn" class="btn btn-ghost" disabled>Next</button>
          </div>
        </section>`;

      const arrangedEl = document.getElementById("arranged");
      gameArea.querySelectorAll("[data-chunk]").forEach(chip => {
        chip.addEventListener("click", () => {
          if (chip.classList.contains("used")) return;
          chip.classList.add("used");
          arranged.push(chip.dataset.chunk);
          const tag = document.createElement("span");
          tag.className = "chip";
          tag.textContent = chip.dataset.chunk;
          arrangedEl.appendChild(tag);
        });
      });

      document.getElementById("checkBtn").addEventListener("click", () => {
        const good = JSON.stringify(arranged) === JSON.stringify(item.chunks);
        const feedback = document.getElementById("feedback");
        feedback.textContent = good ? `${encouragement(true)} Order is correct.` : encouragement(false);
        feedback.className = `feedback ${good ? "success" : "error"}`;
        handleScore(good, 20);
        document.getElementById("nextBtn").disabled = false;
      });

      document.getElementById("nextBtn").addEventListener("click", next);
    }

    function renderFlash(item) {
      gameArea.innerHTML = `
        <section class="card">
          <span class="verse-ref">${item.ref}</span>
          <div class="question">${item.text}</div>
          <div class="feedback success">Review this verse, then move on.</div>
          <div class="controls">
            <button id="nextBtn" class="btn btn-main">Next Card</button>
            <button id="bonusBtn" class="btn btn-ghost">+5 Focus Points</button>
          </div>
        </section>`;
      document.getElementById("nextBtn").addEventListener("click", next);
      document.getElementById("bonusBtn").addEventListener("click", () => {
        state.score += 5;
        updateBest();
        updateHeader();
      });
    }

    function handleScore(correct, pts) {
      if (correct) {
        state.score += pts;
        state.streak += 1;
      } else {
        state.streak = 0;
      }
      updateBest();
      updateHeader();
    }

    function updateBest() {
      if (state.score > state.best) {
        state.best = state.score;
        localStorage.setItem("revMemBest", String(state.best));
      }
    }

    function next() {
      state.index += 1;
      render();
    }

    function celebrate() {
      for (let i = 0; i < 70; i++) {
        const dot = document.createElement("div");
        dot.className = "sparkle";
        dot.style.left = `${Math.random() * window.innerWidth}px`;
        dot.style.top = `${Math.random() * window.innerHeight * 0.5}px`;
        dot.style.background = ["#ff4fa3", "#ff85c2", "#ffd6e8", "#22a06b"][Math.floor(Math.random() * 4)];
        dot.style.setProperty("--x", `${(Math.random() - 0.5) * 220}px`);
        dot.style.setProperty("--y", `${Math.random() * 260 + 40}px`);
        document.body.appendChild(dot);
        setTimeout(() => dot.remove(), 1100);
      }
    }

    function renderCompletion() {
      celebrate();
      gameArea.innerHTML = `
        <section class="card completion">
          <h2>Round Complete 🎉</h2>
          <p>You reviewed all cards in this mode. Keep going—you’re building strong memory in the Word.</p>
          <p><strong>Final Score:</strong> ${state.score}</p>
          <div class="controls">
            <button id="replayBtn" class="btn btn-main">Replay This Mode</button>
            <button id="switchBtn" class="btn btn-ghost">Pick Another Mode</button>
          </div>
        </section>`;

      document.getElementById("replayBtn").addEventListener("click", () => resetMode(state.mode));
      document.getElementById("switchBtn").addEventListener("click", () => {
        state.index = 0;
        updateHeader();
        gameArea.innerHTML = `<section class="card"><div class="question">Choose another mode to continue memorizing.</div></section>`;
      });
    }

    function resetMode(mode) {
      buildRounds();
      state.mode = mode;
      state.index = 0;
      state.streak = 0;
      state.score = 0;
      updateHeader();
      render();
    }

    document.querySelectorAll(".mode-tabs button").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".mode-tabs button").forEach(b => b.classList.remove("active"));
        tab.classList.add("active");
        resetMode(tab.dataset.mode);
      });
    });

    document.getElementById("restartBtn").addEventListener("click", () => resetMode(state.mode));
    document.getElementById("resetBtn").addEventListener("click", () => {
      localStorage.removeItem("revMemBest");
      state.best = 0;
      updateHeader();
    });

    reviewText.textContent = verses.map(v => `${v.ref}\n${v.text}`).join("\n\n");

    buildRounds();
    updateHeader();
    render();
  </script>
</body>
</html>
